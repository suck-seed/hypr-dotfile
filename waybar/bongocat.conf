# Visual settings
cat_height=46                 # Size of bongo cat (16-128)
cat_x_offset=908                   # Horizontal position 1.0

#cat_y_offset=16                 # Vertical position offset
#overlay_position=bottom             # Position on screen (top/bottom) # Note: hot-reload does not work for this option, requires a restart

cat_y_offset=-7                 # Vertical position offset
overlay_position=top             # Position on screen (top/bottom) # Note: hot-reload does not work for this option, requires a restart


overlay_opacity=0              # Background opacity (0-255)

# Animation settings
idle_frame=0                     # Frame to show when idle (0-3)
fps=30                           # Frame rate (1-120)
keypress_duration=100            # Animation duration (ms)
test_animation_interval=0        # Test animation every N seconds (0=off)

# Anti-aliasing settings
enable_antialiasing=1 # Use bilinear interpolation for smooth scaling (0=off, 1=on)

# Input devices (add multiple lines for multiple keyboards)
keyboard_device=/dev/input/event2 # Keyboard

# Multi-monitor support
monitor=eDP-1                    # Specify which monitor to display on (optional)

# Debug
enable_debug=1                   # Show debug messages
