$mainMod = SUPER

bind = , XF86Launch1, exec, ~/.config/hypr/scripts/baraction

# TOUCHPAD TOGGLE
bind = , XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad_toggle.sh

# ROFI
bind = $mainMod, SPACE, exec, ~/.config/rofi/launcher.sh

# HYMISSION
bind = $mainMod, TAB, hymission:toggle
bind = ALT, TAB, hymission:open
#bind = ALT, SHIFT, TAB, hymission:close

bind = $mainMod, C, hymission:toggle,onlycurrentworkspace

# SCREENSHOTS
bind = , Print, exec, ~/.config/hypr/scripts/full_screenshot.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/screenshot.sh

# WALLAPAPER
bind = $mainMod, B, exec, ~/.config/hypr/scripts/wallpaper_selector.sh

# FLOATING SHORT
bind = SUPER, F, togglefloating

# set exact size of the active window (floating only)
bind = $mainMod , A, resizeactive, exact 1800 1100
bind = $mainMod , S, resizeactive, exact 1600 1000
bind = $mainMod , D, resizeactive, exact 1400 900
bind = $mainMod , G, resizeactive, exact 1100 400
bind = $mainMod , R, resizeactive, exact 785 400
bind = $mainMod SHIFT, C, centerwindow

# FULLSCREEN
bind = $mainMod, X, fullscreenstate, 1
bind = $mainMod SHIFT, X, fullscreenstate, 2

# LAYOUTT
bind = $mainMod ctrl, D,exec, hyprctl keyword general:layout dwindle
bind = $mainMod ctrl, S,exec, hyprctl keyword general:layout scrolling

# QUALI
bind = $mainMod, I, exec, hyprpicker | wl-copy
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = SUPER, period, exec, rofi -show emoji
bind = $mainMod , comma, exec, rofi -show nerdy

# WAYBAR HIDE
#bind = SUPER, Z, exec, pkill -SIGUSR1 waybar & pkill -SIGUSR1 bongocat
bind = SUPER, Z, exec, pkill -SIGUSR1 waybar

#bind = SUPER SHIFT, Z, exec, pkill -SIGUSR1 waybar & bongocat --config ~/.config/waybar/bongocat.conf --watch-config
bind = SUPER SHIFT, Z, exec, pkill -SIGUSR1 waybar


# Lock lid on close
bindl=,switch:off:Lid Switch, exec, hyprlock

# NEW AUDIO MANAGEMENT
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%- --limit 1.0
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+ --limit 1.0
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle


# MIC TOGGLE
#bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/mute_mic_script.sh

# BRIGHTNESS
bind = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = ,XF86MonBrightnessUp, exec, brightnessctl s +10%

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# sets repeatable binds for resizing the active window
bind = $mainMod, right, workspace, +1
bind = $mainMod, left, workspace, -1

# sets repeatable binds for resizing the active window
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, t, exec, ghostty  #open the terminal
bind = $mainMod, w, killactive, # close the active window

bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
bind = $mainMod, E, exec, nautilus # Show the graphical file browser

bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, Q, exec, hyprlock
bind = $mainMod, P, exit
