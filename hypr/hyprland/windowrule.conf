# Blur Rofi Wayland layer
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi

# Blur Waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

# Blur SwayNC
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.7,match:namespace swaync-control-center
layerrule = ignore_alpha 0.7,match:namespace swaync-notification-window

# Dialogs
#windowrule = opacity 1.0 override 1.0 override, match:modal true
windowrule = float on, match:class ^(polkit|pinentry)
windowrule = center on, match:class ^(polkit|pinentry)


# Zen Pip
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 640 360, match:title ^(Picture-in-Picture)$
windowrule = move 100%-874 100%-500, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$


#Bongocat
layerrule = blur off, match:namespace bongocat-overlay
layerrule = ignore_alpha 1, match:namespace bongocat-overlay
