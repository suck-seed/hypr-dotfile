# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
    }

    sensitivity = 1.0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
}

general {

    gaps_in = 5
    gaps_out = 15
    border_size = 2

    col.inactive_border = rgba(cecacdff)
    col.active_border = rgba(696969ff)

    layout = scrolling
}

misc {
    disable_hyprland_logo = yes
}

decoration {

    screen_shader = /home/nothing/.config/hypr/shaders/rounded.glsl
    rounding = 8

    blur {
        enabled = true
        size = 10
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray=false
        popups = yes
    }

    shadow {
        enabled = true
        range = 24
        render_power = 4
       	color = 0x2a000000
		color_inactive = 0x1a000000
        offset = 0 2         # very slight downward bias
        scale = 1.0
    }

}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = windowsMove, 1, 3, myBezier

    animation = border, 1, 6, default
    animation = fade, 1, 3, default

    animation = workspaces, 1, 3, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

scrolling {
	follow_focus = true                    # when a window is focused, the layout will move to make it visible
	fullscreen_on_one_column = true
	column_width = 0.7                 # default column width as a fraction of the monitor width
	direction = right
}

monocle {

}



# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
    animate_manual_resizes = true
    close_special_on_empty = false
    on_focus_under_fullscreen = 1
    enable_swallow=true
}
